{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Arcade Login</title>

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>

/* ---------- GLOBAL ---------- */

body{
    margin:0;
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;

    background:
        linear-gradient(rgba(15,23,42,0.75), rgba(15,23,42,0.85)),
        url("{% static 'images/login_bg.jpg' %}");

    background-size:cover;
    background-position:center;

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;
    box-sizing:border-box;

    color:white;
}

/* ---------- ROTATE WARNING ---------- */

.rotate-warning{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#0f172a;
    color:white;
    font-size:22px;
    justify-content:center;
    align-items:center;
    text-align:center;
    z-index:999;
}

/* ---------- CONTAINER ---------- */

.container{
    width:380px;
    max-width:90%;
    min-height:420px;
    position:relative;
}

/* ---------- PANEL ---------- */

.panel{

    padding:30px;

    border-radius:14px;

    background:rgba(255,255,255,0.04); /* more transparent */

    backdrop-filter:blur(6px);          /* less blur */
    -webkit-backdrop-filter:blur(6px);

    border:1px solid rgba(255,255,255,0.08);

    box-shadow:0 10px 35px rgba(0,0,0,0.45);

    flex-direction:column;
    gap:12px;

    display:none;
}

.panel.active{
    display:flex;
    animation:panelFade .25s ease;
}

@keyframes panelFade{
    from{
        opacity:0;
        transform:scale(.97);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

/* ---------- TITLE ---------- */

.title{
    font-size:22px;
    font-weight:600;
    text-align:center;
    margin-bottom:10px;
}

/* ---------- INPUT ---------- */

input{
    width:100%;
    height:40px;

    background:#1e293b;
    border:1px solid #334155;

    border-radius:6px;

    padding:0 10px;
    color:white;

    font-size:14px;

    box-sizing:border-box;
}

input:focus{
    outline:none;
    border-color:#38bdf8;
    box-shadow:0 0 0 1px #38bdf8;
}

/* ---------- BUTTON ---------- */

button{

    height:42px;
    border:none;
    border-radius:6px;

    background:#38bdf8;
    color:white;

    font-weight:600;
    font-size:14px;

    cursor:pointer;

    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
}

button:hover{
    background:#0ea5e9;
}

button img{
    width:18px;
    height:18px;
    object-fit:contain;
}

/* ---------- SWITCH ---------- */

.switch{
    text-align:center;
    font-size:13px;
    color:#9ca3af;
    cursor:pointer;
}

.switch span{
    color:#22c55e;
}

/* ---------- ERROR ---------- */

.error{
    color:#ef4444;
    font-size:13px;
    text-align:center;
}

/* ---------- MOBILE ---------- */

@media(max-width:500px){

.container{
    width:100%;
    max-width:320px;
}

.panel{
    padding:20px;
}

input{
    height:38px;
}

button{
    height:40px;
}

}

/* ---------- FORCE LANDSCAPE ---------- */

@media screen and (orientation:portrait){

.container{
    display:none;
}

.rotate-warning{
    display:flex;
}

}

</style>
</head>

<body>

<div class="rotate-warning">
Rotate your device to landscape
</div>

<div class="container">

<!-- LOGIN -->

<div id="loginPanel" class="panel active">

<div class="title">Login</div>

{% if messages %}
{% for message in messages %}
<div class="error">{{ message }}</div>
{% endfor %}
{% endif %}

<input id="loginGamerName" placeholder="Gamer Name">
<input id="loginPassword" type="password" placeholder="Password">

<button onclick="submitLogin()">
<img src="{% static 'images/icon.jpg' %}">
Login
</button>

<div class="switch" onclick="togglePanel()">
Don't have an account? <span>Register</span>
</div>

</div>

<!-- REGISTER -->

<div id="registerPanel" class="panel">

<div class="title">Register</div>

<input id="regName" placeholder="Your Name">
<input id="regGamerName" placeholder="Gamer Name">
<input id="regAge" type="number" placeholder="Age">
<input id="regGmail" type="email" placeholder="Email">
<input id="regPassword" type="password" placeholder="Password">
<input id="regConfirmPassword" type="password" placeholder="Confirm Password">

<button onclick="submitRegister()">
<img src="{% static 'images/icon.jpg' %}">
Create Account
</button>

<div class="switch" onclick="togglePanel()">
Already have an account? <span>Login</span>
</div>

</div>

</div>

<script>

/* ---------- FULLSCREEN ---------- */

function goFullscreen(){

if(!document.fullscreenElement){

if(document.documentElement.requestFullscreen){
document.documentElement.requestFullscreen()
}

}

}

/* first tap enters fullscreen */

document.addEventListener("click", goFullscreen)

/* allow re-enter if user exits fullscreen */

document.addEventListener("fullscreenchange",()=>{

if(!document.fullscreenElement){
console.log("Exited fullscreen")
}

})

/* ---------- PANEL SWITCH ---------- */

function togglePanel(){

const login=document.getElementById("loginPanel")
const register=document.getElementById("registerPanel")

login.classList.toggle("active")
register.classList.toggle("active")

}

/* ---------- LOGIN ---------- */

function submitLogin(){

if(!loginGamerName.value || !loginPassword.value){
alert("Please fill all fields")
return
}

const form=document.createElement("form")
form.method="POST"

form.innerHTML=`
<input type="hidden" name="csrfmiddlewaretoken" value="{{ csrf_token }}">
<input type="hidden" name="login" value="1">
<input type="hidden" name="gamer_name" value="${loginGamerName.value}">
<input type="hidden" name="password" value="${loginPassword.value}">
`

document.body.appendChild(form)
form.submit()

}

/* ---------- REGISTER ---------- */

function submitRegister(){

if(!regName.value || !regGamerName.value || !regPassword.value){
alert("Please fill all fields")
return
}

const form=document.createElement("form")
form.method="POST"

form.innerHTML=`
<input type="hidden" name="csrfmiddlewaretoken" value="{{ csrf_token }}">
<input type="hidden" name="register" value="1">
<input type="hidden" name="name" value="${regName.value}">
<input type="hidden" name="gamer_name" value="${regGamerName.value}">
<input type="hidden" name="age" value="${regAge.value}">
<input type="hidden" name="gmail" value="${regGmail.value}">
<input type="hidden" name="password" value="${regPassword.value}">
<input type="hidden" name="confirm_password" value="${regConfirmPassword.value}">
`

document.body.appendChild(form)
form.submit()

}

</script>

</body>
</html>
