{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Arcade Login</title>

<style>

/* ---------- GLOBAL ---------- */

body{
    margin:0;
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;

    

    background-size:cover;
    background-position:center;
    background-attachment:fixed;

    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    color:white;
}

/* ---------- CARD ---------- */

/* ---------- CONTAINER ---------- */

.container{
    width:380px;
    max-width:90%;
    min-height:420px;
    position:relative;
}

/* ---------- PANEL ---------- */

.panel{

    padding:30px;

    border-radius:14px;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);

    border:1px solid rgba(255,255,255,0.15);

    box-shadow:
    0 10px 35px rgba(0,0,0,0.45);

    display:flex;
    flex-direction:column;
    gap:12px;
    display:none;
}

.panel.active{
    display:flex;
}

@keyframes panelFade{
    from{
        opacity:0;
        transform:scale(.97);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}


.panel.active{
    opacity:1;
    transform:scale(1);
    pointer-events:auto;
}

/* ---------- TITLE ---------- */

.title{
    font-size:22px;
    font-weight:600;
    text-align:center;
    margin-bottom:10px;
}

/* ---------- INPUT ---------- */

input{
    width:100%;
    height:40px;

    background:#1e293b;
    border:1px solid #334155;

    border-radius:6px;

    padding:0 10px;
    color:white;

    font-size:14px;

    box-sizing:border-box;
}

input:focus{
    outline:none;
    border-color:#22c55e;
}

/* ---------- BUTTON ---------- */

button{
    height:42px;
    border:none;
    border-radius:6px;

    background:#22c55e;
    color:white;

    font-weight:600;
    font-size:14px;

    cursor:pointer;
}

button:hover{
    background:#16a34a;
}

/* ---------- SWITCH ---------- */

.switch{
    text-align:center;
    font-size:13px;
    color:#9ca3af;
    cursor:pointer;
}

.switch span{
    color:#22c55e;
}

/* ---------- ERROR ---------- */

.error{
    color:#ef4444;
    font-size:13px;
    text-align:center;
}

/* ---------- MOBILE ---------- */

@media(max-width:500px){

.container{
    width:320px;
}

.panel{
    padding:26px;
}

}

</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->

<div id="loginPanel" class="panel active">

<div class="title">Login</div>

{% if messages %}
{% for message in messages %}
<div class="error">{{ message }}</div>
{% endfor %}
{% endif %}

<input id="loginGamerName" placeholder="Gamer Name">
<input id="loginPassword" type="password" placeholder="Password">

<button onclick="submitLogin()">Login</button>

<div class="switch" onclick="togglePanel()">
Don't have an account? <span>Register</span>
</div>

</div>

<!-- REGISTER -->

<div id="registerPanel" class="panel">

<div class="title">Register</div>

{% if messages %}
{% for message in messages %}
<div class="error">{{ message }}</div>
{% endfor %}
{% endif %}

<input id="regName" placeholder="Your Name">
<input id="regGamerName" placeholder="Gamer Name">
<input id="regAge" type="number" placeholder="Age">
<input id="regGmail" type="email" placeholder="Email">
<input id="regPassword" type="password" placeholder="Password">
<input id="regConfirmPassword" type="password" placeholder="Confirm Password">

<button onclick="submitRegister()">Create Account</button>

<div class="switch" onclick="togglePanel()">
Already have an account? <span>Login</span>
</div>

</div>

</div>

<script>

/* PANEL SWITCH */

function togglePanel(){

const login=document.getElementById("loginPanel")
const register=document.getElementById("registerPanel")

login.classList.toggle("active")
register.classList.toggle("active")

}

/* LOGIN */

function submitLogin(){

const form=document.createElement("form")
form.method="POST"

form.innerHTML=`
<input type="hidden" name="csrfmiddlewaretoken" value="{{ csrf_token }}">
<input type="hidden" name="login" value="1">
<input type="hidden" name="gamer_name" value="${loginGamerName.value}">
<input type="hidden" name="password" value="${loginPassword.value}">
`

document.body.appendChild(form)
form.submit()

}

/* REGISTER */

function submitRegister(){

const form=document.createElement("form")
form.method="POST"

form.innerHTML=`
<input type="hidden" name="csrfmiddlewaretoken" value="{{ csrf_token }}">
<input type="hidden" name="register" value="1">
<input type="hidden" name="name" value="${regName.value}">
<input type="hidden" name="gamer_name" value="${regGamerName.value}">
<input type="hidden" name="age" value="${regAge.value}">
<input type="hidden" name="gmail" value="${regGmail.value}">
<input type="hidden" name="password" value="${regPassword.value}">
<input type="hidden" name="confirm_password" value="${regConfirmPassword.value}">
`

document.body.appendChild(form)
form.submit()

}

</script>

</body>
</html>
