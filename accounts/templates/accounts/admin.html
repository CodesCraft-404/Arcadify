{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Arcade Admin</title>

<style>

body{
    margin:0;
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;

    background:
    linear-gradient(rgba(15,23,42,.85), rgba(15,23,42,.95)),
    url("{% static 'images/login_bg.jpg' %}");

    background-size:cover;
    background-position:center;

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    color:white;
}

/* panel */

.panel{

    width:600px;
    max-width:95%;

    padding:30px;

    border-radius:16px;

    background:rgba(255,255,255,.08);

    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);

    border:1px solid rgba(255,255,255,.15);

    box-shadow:0 15px 40px rgba(0,0,0,.5);
}

/* title */

.title{
    font-size:28px;
    text-align:center;
    margin-bottom:25px;
}

/* grid */

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
    gap:15px;
}

/* cards */

.card{

    padding:20px;

    border-radius:10px;

    background:rgba(0,0,0,.35);

    text-align:center;

    cursor:pointer;

    transition:.2s;
}

.card:hover{
    background:rgba(0,0,0,.55);
}

/* logout */

.logout{

    margin-top:25px;

    display:block;

    text-align:center;

    padding:10px;

    background:#ef4444;

    border-radius:6px;

    text-decoration:none;

    color:white;
}

.logout:hover{
    background:#dc2626;
}

</style>
</head>

<body>

<div class="panel">

<div class="title">🎮 Arcade Admin Panel</div>

<div class="grid">

<div class="card">
Users
</div>

<div class="card">
Games
</div>

<div class="card">
Server Stats
</div>

<div class="card">
Logs
</div>

</div>

<a class="logout" href="{% url 'logout' %}">
Logout
</a>

</div>

</body>
</html>
