<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>
<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#1e1e2f;
color:white;
height:100vh;
overflow:hidden;
}

/* PLAYER NAME */

.player-name{
position:absolute;
top:20px;
left:20px;
font-size:28px;
font-weight:600;
}

/* MENU BUTTON */

.menu-btn{
position:absolute;
top:20px;
right:20px;
font-size:26px;
cursor:pointer;
}

/* CENTER MENU PANEL */

.menu-panel{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0.9);

background:#222;
padding:30px;
border-radius:10px;

box-shadow:0 10px 30px rgba(0,0,0,0.6);

opacity:0;
pointer-events:none;

transition:0.25s;
}

.menu-panel.show{
opacity:1;
transform:translate(-50%,-50%) scale(1);
pointer-events:auto;
}

/* LOGOUT BUTTON */

.logout-btn{
padding:12px 30px;
border:none;
border-radius:6px;
background:#ff4c4c;
color:white;
cursor:pointer;
font-size:16px;
}

.logout-btn:hover{
background:#e04343;
}

/* GAME MODE BUTTON */

.game-mode{
position:absolute;
bottom:40px;
left:50%;
transform:translateX(-50%);
}

.game-btn{
padding:14px 40px;
font-size:18px;

border:none;
border-radius:8px;

background:#4caf50;
color:white;

cursor:pointer;
}

.game-btn:hover{
background:#45a049;
}

body.menu-open::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
}

@media (max-width: 500px){
    .top-bar { flex-direction: column; gap:10px; align-items:flex-start; }
    .circle-btn { width:40px; height:40px; line-height:40px; }
}

.fullscreen-prompt{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

display:flex;
align-items:center;
justify-content:center;

background:rgba(0,0,0,0.85);
color:white;

font-size:22px;
z-index:999;

cursor:pointer;
transition:0.3s;
}

.fullscreen-prompt.hide{
opacity:0;
pointer-events:none;
}


</style>
</head>
<body>


<div class="player-name">
{{ request.user.gamer_name }}
</div>

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<div class="menu-panel" id="menuPanel">
    <form action="{% url 'logout' %}" method="POST">
        {% csrf_token %}
        <button class="logout-btn" type="submit">Logout</button>
    </form>
</div>

<div class="game-mode">
<button class="game-btn">Game Mode</button>
</div>

<script>
function toggleMenu(){
const panel=document.getElementById("menuPanel");
panel.classList.toggle("show");
document.body.classList.toggle("menu-open");
}

function enterFullscreen(){

if(!document.fullscreenElement){
document.documentElement.requestFullscreen().catch(err=>{
console.log("Fullscreen failed:",err);
});
}

}

/* first click anywhere enters fullscreen */
document.addEventListener("click", enterFullscreen);

/* detect exit */
document.addEventListener("fullscreenchange",()=>{
if(!document.fullscreenElement){
console.log("Exited fullscreen");
}
});
</script>

</body>
</html>
